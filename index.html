<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耀迅國際政府標案工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', Arial, sans-serif; background: #f4f6f8; color: #1a1a1a; min-height: 100vh; }

        .site-header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 32px; display: flex; align-items: center; height: 64px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .logo-wrap { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .logo-wrap img { height: 38px; object-fit: contain; }
        .header-divider { width: 1px; height: 28px; background: #d0d0d0; margin: 0 16px; }
        .header-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
        .header-nav { margin-left: auto; display: flex; gap: 4px; }
        .nav-link { padding: 7px 14px; font-size: 13px; font-weight: 500; color: #555; text-decoration: none; border-radius: 5px; transition: background 0.15s; }
        .nav-link:hover { background: #f0f2f5; color: #1a1a1a; }
        .nav-link.active { background: #5a9e14; color: #fff; }

        .page-body { max-width: 720px; margin: 44px auto; padding: 0 20px 60px; }
        .page-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
        .page-subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }

        .card { background: #fff; border: 1px solid #e4e4e4; border-radius: 10px; padding: 24px 28px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 14px; }

        label { display: block; font-size: 11px; color: #666; margin-bottom: 6px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        input[type="password"], input[type="text"] { width: 100%; padding: 10px 14px; font-size: 14px; font-family: inherit; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #fafafa; transition: border-color 0.2s, box-shadow 0.2s; }
        input:focus { outline: none; border-color: #5a9e14; background: #fff; box-shadow: 0 0 0 3px rgba(90,158,20,0.12); }
        .hint { font-size: 12px; color: #aaa; margin-top: 8px; }

        .btn-goto { display: block; width: 100%; padding: 13px 20px; font-size: 14px; font-weight: 600; font-family: inherit; color: #fff; background: #5a9e14; border: none; border-radius: 7px; cursor: pointer; text-align: center; text-decoration: none; margin-bottom: 10px; transition: background 0.2s, transform 0.15s, box-shadow 0.2s; box-shadow: 0 3px 12px rgba(90,158,20,0.28); }
        .btn-goto:hover:not(.disabled) { background: #4a8610; transform: translateY(-1px); box-shadow: 0 5px 16px rgba(90,158,20,0.38); }
        .btn-goto.disabled { background: #c0c7cc; box-shadow: none; cursor: not-allowed; pointer-events: none; opacity: 0.75; }
        .btn-goto.dark { background: #1a1a1a; box-shadow: 0 3px 12px rgba(0,0,0,0.18); }
        .btn-goto.dark:hover { background: #333; box-shadow: 0 5px 16px rgba(0,0,0,0.25); }

        .btn-test-toggle { display: block; width: 100%; padding: 10px; font-size: 13px; font-family: inherit; font-weight: 500; color: #666; background: #f8f9fa; border: 1.5px dashed #ccc; border-radius: 6px; cursor: pointer; text-align: center; transition: background 0.2s; }
        .btn-test-toggle:hover { background: #eef0f3; }
        #testSection { display: none; margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .test-title { font-size: 14px; font-weight: 600; color: #333; margin-bottom: 14px; }
        .form-grid { display: grid; grid-template-columns: 90px 1fr; gap: 10px; align-items: center; }

        button.btn-action { padding: 9px 20px; font-size: 13px; font-family: inherit; font-weight: 600; background: #5a9e14; color: #fff; border: none; cursor: pointer; border-radius: 6px; transition: background 0.2s; margin-top: 10px; }
        button.btn-action:hover { background: #4a8610; }
        button.btn-action:disabled { background: #c0c7cc; cursor: not-allowed; }
        button.btn-action.dark { background: #444; }
        button.btn-action.dark:hover { background: #222; }

        .progress-box { display: none; margin-top: 16px; padding: 14px 18px; background: #f8f9fa; border-radius: 7px; border-left: 3px solid #5a9e14; }
        .step { margin: 5px 0; font-size: 13px; font-weight: 500; color: #bbb; }
        .step.active { color: #5a9e14; }
        .step.done { color: #28a745; }
        .step.error { color: #dc3545; }

        table { border-collapse: collapse; width: 100%; margin-top: 16px; font-size: 13px; }
        th, td { border: 1px solid #e4e4e4; padding: 9px 12px; text-align: left; }
        th { background: #f4f6f8; color: #666; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:nth-child(even) { background: #fafafa; }
        .view-btn { display: inline-block; padding: 4px 10px; background: #5a9e14; color: #fff; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .view-btn:hover { background: #4a8610; }
    </style>
</head>
<body>

<header class="site-header">
    <a href="index.html" class="logo-wrap">
        <img src="img/eff_logo_1223.jpg" alt="耀迅國際 EFF">
    </a>
    <div class="header-divider"></div>
    <span class="header-title">政府標案工具</span>
    <nav class="header-nav">
        <a href="index.html" class="nav-link active">首頁</a>
        <a href="scheduled.html" class="nav-link">設定</a>
        <a href="database.html" class="nav-link">資料庫</a>
    </nav>
</header>

<div class="page-body">
    <h1 class="page-title">耀迅國際政府標案工具</h1>
    <p class="page-subtitle">自動蒐集政府採購網最新標案，支援關鍵字監控與每日排程通知。</p>

    <div class="card">
        <div class="card-title">存取驗證</div>
        <label for="token">存取密碼</label>
        <input type="password" id="token" placeholder="請輸入存取密碼" oninput="onTokenInput()">
        <p class="hint">上次輸入的密碼已自動記憶，無需重複輸入。</p>
    </div>

    <div class="card">
        <div class="card-title">功能入口</div>
        <a id="gotoBtn" href="scheduled.html" class="btn-goto disabled" onclick="return checkTokenBeforeGo(event)">前往設定</a>
        <a href="database.html" class="btn-goto dark">資料庫</a>
        <button class="btn-test-toggle" id="testToggleBtn" onclick="toggleTest()">單次手動測試查詢（展開）</button>

        <div id="testSection">
            <p class="test-title">手動觸發單次查詢</p>
            <div class="form-grid">
                <label>關鍵字</label> <input type="text" id="keyword" value="IGBT">
                <label>開始日期</label> <input type="text" id="startDate" value="2025/05/01" placeholder="YYYY/MM/DD">
                <label>結束日期</label> <input type="text" id="endDate" value="2025/05/31" placeholder="YYYY/MM/DD">
            </div>
            <br>
            <button id="runBtn" class="btn-action" onclick="triggerAction()">啟動雲端查詢</button>

            <div id="progressBox" class="progress-box">
                <div id="step1" class="step">1. 系統連線與發送指令...</div>
                <div id="step2" class="step">2. 雲端爬蟲查詢中 (約需 30~60 秒)... <span id="timer"></span></div>
                <div id="step3" class="step">3. 資料解析與匯入中...</div>
            </div>

            <div id="resultSection" style="display:none; margin-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="font-size:14px; color:#333;">查詢結果</strong>
                    <button class="btn-action dark" onclick="loadRawCSV()" style="padding:6px 14px; font-size:12px; margin-top:0;">重新載入</button>
                </div>
                <div id="tableContainer" style="overflow-x: auto; margin-top: 12px;">載入中...</div>
            </div>
        </div>
    </div>
</div>

<script>
    const GITHUB_OWNER = 'one393143';
    const GITHUB_REPO  = 'tender-tracker';

    const tokenInput = document.getElementById('token');
    tokenInput.value = localStorage.getItem('gh_token') || '';
    updateUIState();

    function onTokenInput() {
        const val = tokenInput.value.trim();
        if (val) localStorage.setItem('gh_token', val);
        else localStorage.removeItem('gh_token');
        updateUIState();
    }

    function updateUIState() {
        const hasToken = tokenInput.value.trim().length > 0;
        const gotoBtn = document.getElementById('gotoBtn');
        if (hasToken) gotoBtn.classList.remove('disabled');
        else gotoBtn.classList.add('disabled');
    }

    function checkTokenBeforeGo(event) {
        if (!tokenInput.value.trim()) {
            event.preventDefault();
            tokenInput.focus();
            tokenInput.style.borderColor = '#dc3545';
            setTimeout(() => tokenInput.style.borderColor = '', 1500);
            return false;
        }
        return true;
    }

    let testVisible = false;
    function toggleTest() {
        testVisible = !testVisible;
        document.getElementById('testSection').style.display = testVisible ? 'block' : 'none';
        document.getElementById('testToggleBtn').textContent =
            testVisible ? '單次手動測試查詢（收起）' : '單次手動測試查詢（展開）';
    }

    function updateStep(stepNum, status, text) {
        const el = document.getElementById('step' + stepNum);
        el.className = 'step' + (status ? ' ' + status : '');
        el.textContent = text;
    }

    let checkInterval;
    let secondsPassed = 0;

    async function triggerAction() {
        const token = tokenInput.value.trim();
        if (!token) { alert('請先輸入存取密碼！'); tokenInput.focus(); return; }

        document.getElementById('runBtn').disabled = true;
        document.getElementById('progressBox').style.display = 'block';
        document.getElementById('resultSection').style.display = 'none';
        updateStep(1, 'active', '1. 系統連線與發送指令中...');
        updateStep(2, '', '2. 雲端爬蟲執行中...');
        updateStep(3, '', '3. 資料解析與匯入中...');

        try {
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/run_scraper.yml/dispatches`,
                {
                    method: 'POST',
                    headers: { 'Accept': 'application/vnd.github.v3+json', 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ref: 'main', inputs: { keyword: document.getElementById('keyword').value, start_date: document.getElementById('startDate').value, end_date: document.getElementById('endDate').value } })
                }
            );
            if (response.ok) {
                updateStep(1, 'done', '1. 指令發送成功！');
                updateStep(2, 'active', '2. 雲端爬蟲執行中 (0s)...');
                setTimeout(() => trackActionStatus(token), 3000);
            } else {
                updateStep(1, 'error', '1. 連線錯誤，請確認密碼是否正確。');
                document.getElementById('runBtn').disabled = false;
            }
        } catch (err) {
            updateStep(1, 'error', '1. 發生錯誤：' + err.message);
            document.getElementById('runBtn').disabled = false;
        }
    }

    function trackActionStatus(token) {
        secondsPassed = 3;
        if (checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(async () => {
            secondsPassed += 3;
            updateStep(2, 'active', `2. 雲端爬蟲執行中 (${secondsPassed}s)...`);
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/runs?event=workflow_dispatch&per_page=1`, { headers: { 'Authorization': `Bearer ${token}` } });
                const data = await res.json();
                if (data.workflow_runs && data.workflow_runs.length > 0) {
                    const run = data.workflow_runs[0];
                    if (run.status === 'completed') {
                        clearInterval(checkInterval);
                        if (run.conclusion === 'success') {
                            updateStep(2, 'done', `2. 爬蟲執行完成！(耗時約 ${secondsPassed}s)`);
                            updateStep(3, 'active', '3. 正在從資料庫抽取最新資料...');
                            setTimeout(() => loadRawCSV(token), 1000);
                        } else {
                            updateStep(2, 'error', `2. 爬蟲執行失敗 (${run.conclusion})，請檢查 GitHub Logs。`);
                            document.getElementById('runBtn').disabled = false;
                        }
                    }
                }
            } catch (e) {}
            if (secondsPassed >= 120) { clearInterval(checkInterval); updateStep(2, 'error', '2. 等待逾時，請稍後手動重整。'); document.getElementById('runBtn').disabled = false; }
        }, 3000);
    }

    async function loadRawCSV(token) {
        token = token || tokenInput.value.trim();
        if (!token) return;
        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('tableContainer').innerHTML = '資料下載與解析中...';
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data/results.csv?t=${Date.now()}`, { headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' } });
            if (!res.ok) throw new Error('找不到資料檔案，可能是爬蟲尚未產出結果。');
            renderTable(await res.text());
            updateStep(3, 'done', '3. 最新資料匯入完成！');
            document.getElementById('runBtn').disabled = false;
        } catch (error) {
            document.getElementById('tableContainer').innerHTML = `<p style="color:#dc3545">無法讀取資料：${error.message}</p>`;
            updateStep(3, 'error', '3. 資料匯入失敗。');
            document.getElementById('runBtn').disabled = false;
        }
    }

    function renderTable(csvText) {
        const rows = csvText.split('\n').filter(r => r.trim());
        if (rows.length <= 1) { document.getElementById('tableContainer').innerHTML = "<p style='color:gray'>查無符合條件的資料。</p>"; return; }
        let html = '<table>';
        rows.forEach((row, index) => {
            let result = [], current = '', inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                let char = row[i];
                if (char === '"' && row[i+1] === '"') { current += '"'; i++; }
                else if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            const cols = result.map(s => s.replace(/^"|"$/g, '').trim());
            html += '<tr>';
            cols.forEach((col, ci) => {
                if (index === 0) html += `<th>${col}</th>`;
                else if (ci === cols.length - 1 && col.startsWith('http')) html += `<td><a href="${col}" target="_blank" class="view-btn">檢視</a></td>`;
                else html += `<td>${col}</td>`;
            });
            html += '</tr>';
        });
        html += '</table>';
        document.getElementById('tableContainer').innerHTML = html;
    }
</script>
</body>
</html>
