<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>標案自動查詢控制台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; }
        .box { border: 1px solid #ccc; padding: 15px; margin-bottom: 20px; border-radius: 5px; }
        input, button { padding: 8px; margin-top: 5px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 8px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>

    <h1>🏛️ 標案自動查詢控制台</h1>

    <div class="box">
        <h3>1. 系統設定 (請輸入您的 GitHub 資訊)</h3>
        <p><i>為了讓網頁能觸發您的 GitHub 程式，請輸入以下資訊 (僅存在您瀏覽器本地)。</i></p>
        GitHub 帳號: <input type="text" id="owner" placeholder="例如: your-username"><br>
        專案名稱: <input type="text" id="repo" placeholder="例如: tender-tracker"><br>
        Access Token: <input type="password" id="token" placeholder="ghp_xxxxxxxxx"><br>
        <button onclick="saveSettings()">儲存設定</button>
    </div>

    <div class="box">
        <h3>2. 執行馬上查詢</h3>
        關鍵字: <input type="text" id="keyword" value="IGBT"><br>
        開始日期: <input type="text" id="startDate" value="2025/05/01"> (格式: YYYY/MM/DD)<br>
        結束日期: <input type="text" id="endDate" value="2025/05/31"><br>
        <button onclick="triggerAction()">🚀 馬上執行爬蟲</button>
        <p id="status" style="color: green;"></p>
        <p style="font-size: 12px; color: gray;">註：點擊後，GitHub 背後會啟動 Python，約需 30 秒至 1 分鐘，完成後重新整理網頁即可看到最新資料。</p>
    </div>

    <div class="box">
        <h3>3. 最新資料庫結果 (讀取 repo 內的 CSV)</h3>
        <button onclick="loadCSV()">🔄 載入/更新表格</button>
        <div id="tableContainer"></div>
    </div>

    <script>
        // 載入本地設定
        document.getElementById('owner').value = localStorage.getItem('gh_owner') || '';
        document.getElementById('repo').value = localStorage.getItem('gh_repo') || '';
        document.getElementById('token').value = localStorage.getItem('gh_token') || '';

        function saveSettings() {
            localStorage.setItem('gh_owner', document.getElementById('owner').value);
            localStorage.setItem('gh_repo', document.getElementById('repo').value);
            localStorage.setItem('gh_token', document.getElementById('token').value);
            alert('設定已儲存於瀏覽器！');
        }

        // 呼叫 GitHub API 觸發 Action
        async function triggerAction() {
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const token = document.getElementById('token').value;
            const keyword = document.getElementById('keyword').value;
            const startDate = document.getElementById('startDate').value;
            const endDate = document.getElementById('endDate').value;

            if (!token || !owner || !repo) { alert("請先填寫系統設定！"); return; }

            document.getElementById('status').innerText = "發送請求中...";

            const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/run_scraper.yml/dispatches`, {
                method: 'POST',
                headers: {
                    'Accept': 'application/vnd.github.v3+json',
                    'Authorization': `Bearer ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    ref: 'main',
                    inputs: { keyword: keyword, start_date: startDate, end_date: endDate }
                })
            });

            if (response.ok) {
                document.getElementById('status').innerText = "✅ 指令已送出！GitHub 正在背後執行 Python，稍後請重整讀取資料。";
            } else {
                document.getElementById('status').innerText = "❌ 錯誤：請檢查 Token 權限或專案名稱是否正確。";
            }
        }

        // 讀取 GitHub Pages 上的 CSV 檔案
        async function loadCSV() {
            try {
                // 加上時間戳防止快取
                const response = await fetch(`data/results.csv?t=${new Date().getTime()}`);
                if (!response.ok) throw new Error("尚未產生資料或路徑錯誤");
                const csvText = await response.text();
                
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                let html = '<table>';
                rows.forEach((row, index) => {
                    const cols = row.split(',');
                    html += '<tr>';
                    cols.forEach(col => {
                        html += index === 0 ? `<th>${col}</th>` : `<td>${col}</td>`;
                    });
                    html += '</tr>';
                });
                html += '</table>';
                document.getElementById('tableContainer').innerHTML = html;
            } catch (error) {
                document.getElementById('tableContainer').innerHTML = `<p style="color:red">無法讀取資料，可能是還沒執行過爬蟲：${error.message}</p>`;
            }
        }

        // 進入網頁自動嘗試載入一次
        loadCSV();
    </script>
</body>
</html>
