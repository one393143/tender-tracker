<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>標案自動查詢控制台</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; max-width: 1200px; margin: auto; }
        .box { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.1); }
        input, button { padding: 10px; margin-top: 5px; font-size: 16px; }
        button { background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; }
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f8f9fa; }
        /* 進度條樣式 */
        .progress-box { display: none; margin-top: 15px; padding: 15px; background: #f8f9fa; border-radius: 5px; border-left: 4px solid #007bff; }
        .step { margin: 5px 0; font-weight: bold; color: gray; }
        .step.active { color: #007bff; }
        .step.done { color: #28a745; }
        .view-btn { display: inline-block; padding: 4px 8px; background: #28a745; color: white; text-decoration: none; border-radius: 4px; font-size: 13px; font-weight: bold; }
        .view-btn:hover { background: #218838; }
    </style>
</head>
<body>
    <div style="margin-bottom: 20px;">
        <span style="font-weight: bold; color: gray;">🔍 單次手動查詢</span>
        <span style="margin: 0 15px;">|</span>
        <a href="scheduled.html" style="text-decoration: none; color: #007bff; font-weight: bold;">前往 ⚙️ 任務排程管理中心 →</a>
    </div>
    <h1 style="text-align: center;">🏛️ 標案自動查詢控制台</h1>

    <div class="box">
        <h3>⚙️ 1. 系統設定 (初次使用請填寫)</h3>
        <p style="color: #666; font-size: 14px;">此資訊僅存在您的瀏覽器本地，用於授權遙控您的 GitHub。</p>
        <div style="display: grid; grid-template-columns: 120px 1fr; gap: 10px; align-items: center;">
            <label>GitHub 帳號:</label> <input type="text" id="owner" placeholder="例如: your-username">
            <label>專案名稱:</label> <input type="text" id="repo" placeholder="例如: tender-tracker">
            <label>Access Token:</label> <input type="password" id="token" placeholder="ghp_xxxxxxxxx">
        </div>
        <button onclick="saveSettings()" style="margin-top: 15px;">💾 儲存設定</button>
    </div>

    <div class="box">
        <h3>🚀 2. 執行馬上查詢</h3>
        <div style="display: grid; grid-template-columns: 80px 1fr; gap: 10px; align-items: center;">
            <label>關鍵字:</label> <input type="text" id="keyword" value="IGBT">
            <label>開始日期:</label> <input type="text" id="startDate" value="2025/05/01" placeholder="YYYY/MM/DD">
            <label>結束日期:</label> <input type="text" id="endDate" value="2025/05/31" placeholder="YYYY/MM/DD">
        </div>
        <br>
        <button id="runBtn" onclick="triggerAction()">▶️ 啟動雲端爬蟲</button>
        
        <div id="progressBox" class="progress-box">
            <div id="step1" class="step">⚪ 1. 系統連線與發送指令...</div>
            <div id="step2" class="step">⚪ 2. 雲端爬蟲查詢中 (約需 30~60 秒)... <span id="timer"></span></div>
            <div id="step3" class="step">⚪ 3. 資料解析與匯入中...</div>
        </div>
    </div>

    <div class="box">
        <h3>📊 3. 最新資料庫結果</h3>
        <button onclick="loadCSV(true)" style="background: #28a745;">🔄 手動強制重新載入</button>
        <div id="tableContainer" style="overflow-x: auto; margin-top: 15px;">載入中...</div>
    </div>

    <script>
        // 初始化載入設定
        document.getElementById('owner').value = localStorage.getItem('gh_owner') || '';
        document.getElementById('repo').value = localStorage.getItem('gh_repo') || '';
        document.getElementById('token').value = localStorage.getItem('gh_token') || '';

        let checkInterval; 
        let secondsPassed = 0;

        function saveSettings() {
            localStorage.setItem('gh_owner', document.getElementById('owner').value);
            localStorage.setItem('gh_repo', document.getElementById('repo').value);
            localStorage.setItem('gh_token', document.getElementById('token').value);
            alert('✅ 設定已儲存！');
        }

        function updateStep(stepNum, status, text) {
            const el = document.getElementById('step' + stepNum);
            if(status === 'active') {
                el.className = 'step active';
                el.innerHTML = '🔄 ' + text;
            } else if (status === 'done') {
                el.className = 'step done';
                el.innerHTML = '✅ ' + text;
            } else if (status === 'error') {
                el.className = 'step error';
                el.style.color = 'red';
                el.innerHTML = '❌ ' + text;
            }
        }

        // 1. 觸發 GitHub Actions
        async function triggerAction() {
            const owner = document.getElementById('owner').value;
            const repo = document.getElementById('repo').value;
            const token = document.getElementById('token').value;
            
            if (!token || !owner || !repo) { alert("⚠️ 請先填寫上方系統設定！"); return; }

            document.getElementById('runBtn').disabled = true;
            document.getElementById('progressBox').style.display = 'block';
            updateStep(1, 'active', '1. 系統連線與發送指令中...');
            updateStep(2, '', '⚪ 2. 雲端爬蟲執行中...');
            updateStep(3, '', '⚪ 3. 資料解析與匯入中...');

            // 記錄當下時間，稍後用來尋找「最新觸發」的 Action
            const triggerTime = new Date().getTime();

            try {
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/run_scraper.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: { 
                            keyword: document.getElementById('keyword').value, 
                            start_date: document.getElementById('startDate').value, 
                            end_date: document.getElementById('endDate').value 
                        }
                    })
                });

                if (response.ok) {
                    updateStep(1, 'done', '1. 指令發送成功！');
                    updateStep(2, 'active', '2. 雲端爬蟲執行中 <span id="timer">(0s)</span>...');
                    // 延遲 3 秒後開始追蹤，給 GitHub 一點時間產生執行紀錄
                    setTimeout(() => trackActionStatus(owner, repo, token, triggerTime), 3000);
                } else {
                    updateStep(1, 'error', '1. 連線錯誤，請檢查設定。');
                    document.getElementById('runBtn').disabled = false;
                }
            } catch (err) {
                updateStep(1, 'error', '1. 發生錯誤：' + err.message);
                document.getElementById('runBtn').disabled = false;
            }
        }

        // 2. 真實追蹤 GitHub Actions 執行狀態
        function trackActionStatus(owner, repo, token, triggerTime) {
            secondsPassed = 3;
            if(checkInterval) clearInterval(checkInterval);

            checkInterval = setInterval(async () => {
                secondsPassed += 3;
                document.getElementById('timer').innerText = `(${secondsPassed}s)`;

                try {
                    // 呼叫 API 查詢最近的 Action 紀錄
                    const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/runs?event=workflow_dispatch&per_page=1`, {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const data = await res.json();
                    
                    if (data.workflow_runs && data.workflow_runs.length > 0) {
                        const latestRun = data.workflow_runs[0];
                        
                        // 判斷狀態
                        if (latestRun.status === 'completed') {
                            clearInterval(checkInterval);
                            if (latestRun.conclusion === 'success') {
                                updateStep(2, 'done', `2. 爬蟲執行完成！(耗時約 ${secondsPassed}s)`);
                                updateStep(3, 'active', '3. 正在從資料庫抽取最新資料...');
                                // Action 成功結束，立刻去抽原始檔案！
                                setTimeout(() => loadRawCSV(owner, repo, token), 1000);
                            } else {
                                updateStep(2, 'error', `2. 爬蟲執行失敗 (狀態: ${latestRun.conclusion})。請檢查 GitHub Logs。`);
                                document.getElementById('runBtn').disabled = false;
                            }
                        }
                    }
                } catch(e) {
                    console.log("追蹤狀態時發生錯誤", e);
                }

                if (secondsPassed >= 120) { // 最多等 2 分鐘
                    clearInterval(checkInterval);
                    updateStep(2, 'error', '2. 等待逾時，請稍後手動重整。');
                    document.getElementById('runBtn').disabled = false;
                }
            }, 3000); // 每 3 秒問一次 GitHub
        }

        // 3. 繞過 Pages，直接向 GitHub API 取得原始 CSV 內容
        async function loadRawCSV(owner, repo, token) {
            // 如果沒有傳入參數，就從 LocalStorage 拿 (給手動重整按鈕用的)
            owner = owner || document.getElementById('owner').value;
            repo = repo || document.getElementById('repo').value;
            token = token || document.getElementById('token').value;

            document.getElementById('tableContainer').innerHTML = "資料下載與解析中...";

            try {
                // 使用 GitHub Contents API 取得檔案 (加上 timestamp 防止任何快取)
                const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/data/results.csv?t=${new Date().getTime()}`;
                
                const response = await fetch(apiUrl, {
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        // 關鍵：要求 GitHub 直接回傳原始文字(raw)，而不是 JSON 格式的 base64
                        'Accept': 'application/vnd.github.v3.raw'
                        // ✅ 已移除 Cache-Control，靠網址的 ?t=... 防止快取即可
                    }
                });

                if (!response.ok) throw new Error("找不到資料檔案，可能是爬蟲尚未產出結果。");
                
                const csvText = await response.text();
                renderTable(csvText);
                
                updateStep(3, 'done', '3. 最新資料匯入完成！');
                document.getElementById('runBtn').disabled = false;

            } catch (error) {
                document.getElementById('tableContainer').innerHTML = `<p style="color:red">無法讀取資料：${error.message}</p>`;
                updateStep(3, 'error', '3. 資料匯入失敗。');
                document.getElementById('runBtn').disabled = false;
            }
        }

        // 解析 CSV 並轉成表格 (保持完美處理雙引號的邏輯)
        function renderTable(csvText) {
            const rows = csvText.split('\n').filter(row => row.trim() !== '');
            if(rows.length <= 1) {
                document.getElementById('tableContainer').innerHTML = "<p style='color:gray'>查無符合條件的資料。</p>";
                return;
            }

            let html = '<table>';
            rows.forEach((row, index) => {
                let result = [];
                let current = '';
                let inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    let char = row[i];
                    if (char === '"' && row[i+1] === '"') { current += '"'; i++; }
                    else if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                    else current += char;
                }
                result.push(current.trim());
                const cols = result.map(s => s.replace(/^"|"$/g, '').trim());
                
                html += '<tr>';
                cols.forEach((col, colIndex) => {
                    if (index === 0) {
                        html += `<th>${col}</th>`;
                    } else {
                        // 如果是最後一欄 (連結)，轉為按鈕
                        if (colIndex === cols.length - 1 && col.startsWith('http')) {
                            html += `<td><a href="${col}" target="_blank" class="view-btn">🔗 檢視</a></td>`;
                        } else {
                            html += `<td>${col}</td>`;
                        }
                    }
                });
                html += '</tr>';
            });
            html += '</table>';
            
            document.getElementById('tableContainer').innerHTML = html;
        }

        // 手動載入按鈕綁定
        window.loadCSV = function() {
            loadRawCSV();
        };

        // 網頁開啟時先嘗試載入一次現有資料
        window.onload = loadCSV;
    </script>
</body>
</html>
