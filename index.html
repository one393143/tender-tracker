<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>標案自動查詢控制台</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            background: #f0f2f5;
            line-height: 1.6;
        }
        .container {
            max-width: 900px;
            margin: auto;
        }
        h1 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 28px;
        }
        .box {
            background: #fff;
            border: 1px solid #e0e0e0;
            padding: 24px 28px;
            margin-bottom: 20px;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        .box h3 {
            margin-top: 0;
            color: #1a1a2e;
            font-size: 16px;
        }
        input[type="password"], input[type="text"] {
            padding: 10px 14px;
            font-size: 15px;
            border: 1px solid #ccc;
            border-radius: 6px;
            width: 100%;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #007bff;
        }
        label {
            display: block;
            font-size: 13px;
            color: #555;
            margin-bottom: 6px;
            font-weight: bold;
        }

        /* 主要CTA按鈕：前往任務管理中心 */
        .btn-goto {
            display: block;
            width: 100%;
            padding: 16px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: linear-gradient(135deg, #007bff, #0056b3);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            text-decoration: none;
            margin-bottom: 12px;
            transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 14px rgba(0,123,255,0.35);
            letter-spacing: 0.5px;
        }
        .btn-goto:hover:not(:disabled):not([aria-disabled="true"]) {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(0,123,255,0.45);
        }
        .btn-goto.disabled {
            background: linear-gradient(135deg, #b0b8c1, #9aa3ac);
            box-shadow: none;
            cursor: not-allowed;
            pointer-events: none;
            opacity: 0.7;
        }

        /* 測試查詢展開按鈕 */
        .btn-test-toggle {
            display: block;
            width: 100%;
            padding: 10px;
            font-size: 14px;
            color: #555;
            background: #f8f9fa;
            border: 1px dashed #bbb;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            transition: background 0.2s;
        }
        .btn-test-toggle:hover {
            background: #e9ecef;
        }

        /* 測試查詢展開區塊 */
        #testSection {
            display: none;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #eee;
        }

        /* 普通按鈕 */
        button.btn-action {
            padding: 10px 20px;
            font-size: 15px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
            margin-top: 8px;
        }
        button.btn-action:hover { background: #0056b3; }
        button.btn-action:disabled { background: #ccc; cursor: not-allowed; }
        button.btn-action.green { background: #28a745; }
        button.btn-action.green:hover { background: #218838; }

        /* 進度條 */
        .progress-box {
            display: none;
            margin-top: 15px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 6px;
            border-left: 4px solid #007bff;
        }
        .step { margin: 5px 0; font-weight: bold; color: #aaa; }
        .step.active { color: #007bff; }
        .step.done { color: #28a745; }
        .step.error { color: red; }

        /* 結果表格 */
        table { border-collapse: collapse; width: 100%; margin-top: 16px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; }
        th { background-color: #f8f9fa; color: #333; }
        tr:nth-child(even) { background: #fafafa; }
        .view-btn {
            display: inline-block;
            padding: 4px 10px;
            background: #28a745;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .view-btn:hover { background: #218838; }

        /* 提示文字 */
        .hint { font-size: 12px; color: #999; margin-top: 6px; }
    </style>
</head>
<body>
<div class="container">
    <h1>🏛️ 標案自動查詢控制台</h1>

    <!-- 密碼區 -->
    <div class="box">
        <h3>🔑 請輸入存取密碼</h3>
        <label for="token">密碼</label>
        <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxx" oninput="onTokenInput()">
    </div>

    <!-- 主要導覽區 -->
    <div class="box">
        <!-- 前往任務管理中心（醒目CTA） -->
        <a id="gotoBtn" href="scheduled.html" class="btn-goto disabled" onclick="return checkTokenBeforeGo(event)">
            ⚙️ 前往任務管理中心
        </a>

        <!-- 查看完整資料庫 -->
        <a href="database.html" class="btn-goto" style="background: linear-gradient(135deg, #28a745, #1a7a30); box-shadow: 0 4px 14px rgba(40,167,69,0.35); margin-bottom: 12px;">
            🗄️ 查看完整資料庫
        </a>

        <!-- 測試查詢展開按鈕 -->
        <button class="btn-test-toggle" id="testToggleBtn" onclick="toggleTest()">
            🧪 測試查詢（展開）
        </button>

        <!-- 測試查詢展開後的內容 -->
        <div id="testSection">
            <h3 style="margin-top:0; font-size:15px; color:#444;">🚀 單次手動測試查詢</h3>
            <div style="display: grid; grid-template-columns: 80px 1fr; gap: 10px; align-items: center;">
                <label>關鍵字:</label> <input type="text" id="keyword" value="IGBT">
                <label>開始日期:</label> <input type="text" id="startDate" value="2025/05/01" placeholder="YYYY/MM/DD">
                <label>結束日期:</label> <input type="text" id="endDate" value="2025/05/31" placeholder="YYYY/MM/DD">
            </div>
            <br>
            <button id="runBtn" class="btn-action" onclick="triggerAction()">▶️ 啟動雲端爬蟲</button>

            <div id="progressBox" class="progress-box">
                <div id="step1" class="step">⚪ 1. 系統連線與發送指令...</div>
                <div id="step2" class="step">⚪ 2. 雲端爬蟲查詢中 (約需 30~60 秒)... <span id="timer"></span></div>
                <div id="step3" class="step">⚪ 3. 資料解析與匯入中...</div>
            </div>

            <div id="resultSection" style="display:none; margin-top:20px;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong style="font-size:15px;">📊 查詢結果</strong>
                    <button class="btn-action green" onclick="loadRawCSV()" style="padding:6px 14px; font-size:13px; margin-top:0;">🔄 重新載入</button>
                </div>
                <div id="tableContainer" style="overflow-x: auto; margin-top: 12px;">載入中...</div>
            </div>
        </div>
    </div>
</div>

<script>
    // ============================================================
    // 硬編碼的 GitHub 帳號與專案名稱（無需使用者設定）
    // ============================================================
    const GITHUB_OWNER = 'one393143';
    const GITHUB_REPO  = 'tender-tracker';

    // ============================================================
    // 初始化：從 localStorage 讀回上次的 token
    // ============================================================
    const tokenInput = document.getElementById('token');
    tokenInput.value = localStorage.getItem('gh_token') || '';
    updateUIState();

    // token 輸入時即時存入 localStorage 並更新 UI
    function onTokenInput() {
        const val = tokenInput.value.trim();
        if (val) {
            localStorage.setItem('gh_token', val);
        } else {
            localStorage.removeItem('gh_token');
        }
        updateUIState();
    }

    // 根據 token 是否有值決定按鈕狀態
    function updateUIState() {
        const hasToken = tokenInput.value.trim().length > 0;
        const gotoBtn = document.getElementById('gotoBtn');
        if (hasToken) {
            gotoBtn.classList.remove('disabled');
        } else {
            gotoBtn.classList.add('disabled');
        }
    }

    // 點「前往任務管理中心」時的額外保護
    function checkTokenBeforeGo(event) {
        if (!tokenInput.value.trim()) {
            event.preventDefault();
            tokenInput.focus();
            tokenInput.style.borderColor = '#dc3545';
            setTimeout(() => tokenInput.style.borderColor = '', 1500);
            return false;
        }
        return true;
    }

    // 展開/收起測試查詢區塊
    let testVisible = false;
    function toggleTest() {
        testVisible = !testVisible;
        document.getElementById('testSection').style.display = testVisible ? 'block' : 'none';
        document.getElementById('testToggleBtn').textContent =
            testVisible ? '🧪 測試查詢（收起）' : '🧪 測試查詢（展開）';
    }

    // ============================================================
    // 進度步驟更新
    // ============================================================
    function updateStep(stepNum, status, text) {
        const el = document.getElementById('step' + stepNum);
        if (status === 'active') {
            el.className = 'step active';
            el.innerHTML = '🔄 ' + text;
        } else if (status === 'done') {
            el.className = 'step done';
            el.innerHTML = '✅ ' + text;
        } else if (status === 'error') {
            el.className = 'step error';
            el.innerHTML = '❌ ' + text;
        } else {
            el.className = 'step';
            el.innerHTML = '⚪ ' + text;
        }
    }

    let checkInterval;
    let secondsPassed = 0;

    // ============================================================
    // 1. 觸發 GitHub Actions（單次手動測試用）
    // ============================================================
    async function triggerAction() {
        const token = tokenInput.value.trim();
        if (!token) {
            alert('⚠️ 請先輸入密碼！');
            tokenInput.focus();
            return;
        }

        document.getElementById('runBtn').disabled = true;
        document.getElementById('progressBox').style.display = 'block';
        document.getElementById('resultSection').style.display = 'none';
        updateStep(1, 'active', '1. 系統連線與發送指令中...');
        updateStep(2, '', '2. 雲端爬蟲執行中...');
        updateStep(3, '', '3. 資料解析與匯入中...');

        const triggerTime = new Date().getTime();

        try {
            const response = await fetch(
                `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/workflows/run_scraper.yml/dispatches`,
                {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        ref: 'main',
                        inputs: {
                            keyword:    document.getElementById('keyword').value,
                            start_date: document.getElementById('startDate').value,
                            end_date:   document.getElementById('endDate').value
                        }
                    })
                }
            );

            if (response.ok) {
                updateStep(1, 'done', '1. 指令發送成功！');
                updateStep(2, 'active', '2. 雲端爬蟲執行中 <span id="timer">(0s)</span>...');
                setTimeout(() => trackActionStatus(token, triggerTime), 3000);
            } else {
                updateStep(1, 'error', '1. 連線錯誤，請確認密碼是否正確。');
                document.getElementById('runBtn').disabled = false;
            }
        } catch (err) {
            updateStep(1, 'error', '1. 發生錯誤：' + err.message);
            document.getElementById('runBtn').disabled = false;
        }
    }

    // ============================================================
    // 2. 追蹤 GitHub Actions 執行狀態
    // ============================================================
    function trackActionStatus(token, triggerTime) {
        secondsPassed = 3;
        if (checkInterval) clearInterval(checkInterval);

        checkInterval = setInterval(async () => {
            secondsPassed += 3;
            const timerEl = document.getElementById('timer');
            if (timerEl) timerEl.innerText = `(${secondsPassed}s)`;

            try {
                const res = await fetch(
                    `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/actions/runs?event=workflow_dispatch&per_page=1`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );
                const data = await res.json();

                if (data.workflow_runs && data.workflow_runs.length > 0) {
                    const latestRun = data.workflow_runs[0];
                    if (latestRun.status === 'completed') {
                        clearInterval(checkInterval);
                        if (latestRun.conclusion === 'success') {
                            updateStep(2, 'done', `2. 爬蟲執行完成！(耗時約 ${secondsPassed}s)`);
                            updateStep(3, 'active', '3. 正在從資料庫抽取最新資料...');
                            setTimeout(() => loadRawCSV(token), 1000);
                        } else {
                            updateStep(2, 'error', `2. 爬蟲執行失敗 (狀態: ${latestRun.conclusion})，請檢查 GitHub Logs。`);
                            document.getElementById('runBtn').disabled = false;
                        }
                    }
                }
            } catch (e) {
                console.log('追蹤狀態時發生錯誤', e);
            }

            if (secondsPassed >= 120) {
                clearInterval(checkInterval);
                updateStep(2, 'error', '2. 等待逾時，請稍後手動重整。');
                document.getElementById('runBtn').disabled = false;
            }
        }, 3000);
    }

    // ============================================================
    // 3. 從 GitHub API 取得最新 CSV 並顯示
    // ============================================================
    async function loadRawCSV(token) {
        token = token || tokenInput.value.trim();
        if (!token) return;

        document.getElementById('resultSection').style.display = 'block';
        document.getElementById('tableContainer').innerHTML = '資料下載與解析中...';

        try {
            const apiUrl = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/data/results.csv?t=${Date.now()}`;
            const response = await fetch(apiUrl, {
                headers: {
                    'Authorization': `Bearer ${token}`,
                    'Accept': 'application/vnd.github.v3.raw'
                }
            });

            if (!response.ok) throw new Error('找不到資料檔案，可能是爬蟲尚未產出結果。');

            const csvText = await response.text();
            renderTable(csvText);
            updateStep(3, 'done', '3. 最新資料匯入完成！');
            document.getElementById('runBtn').disabled = false;

        } catch (error) {
            document.getElementById('tableContainer').innerHTML =
                `<p style="color:red">無法讀取資料：${error.message}</p>`;
            updateStep(3, 'error', '3. 資料匯入失敗。');
            document.getElementById('runBtn').disabled = false;
        }
    }

    // ============================================================
    // CSV 解析並渲染為 HTML 表格
    // ============================================================
    function renderTable(csvText) {
        const rows = csvText.split('\n').filter(row => row.trim() !== '');
        if (rows.length <= 1) {
            document.getElementById('tableContainer').innerHTML =
                "<p style='color:gray'>查無符合條件的資料。</p>";
            return;
        }

        let html = '<table>';
        rows.forEach((row, index) => {
            let result = [];
            let current = '';
            let inQuotes = false;
            for (let i = 0; i < row.length; i++) {
                let char = row[i];
                if (char === '"' && row[i + 1] === '"') { current += '"'; i++; }
                else if (char === '"') inQuotes = !inQuotes;
                else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                else current += char;
            }
            result.push(current.trim());
            const cols = result.map(s => s.replace(/^"|"$/g, '').trim());

            html += '<tr>';
            cols.forEach((col, colIndex) => {
                if (index === 0) {
                    html += `<th>${col}</th>`;
                } else {
                    if (colIndex === cols.length - 1 && col.startsWith('http')) {
                        html += `<td><a href="${col}" target="_blank" class="view-btn">🔗 檢視</a></td>`;
                    } else {
                        html += `<td>${col}</td>`;
                    }
                }
            });
            html += '</tr>';
        });
        html += '</table>';
        document.getElementById('tableContainer').innerHTML = html;
    }
</script>
</body>
</html>
