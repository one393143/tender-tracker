<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>設定 — 耀迅國際政府標案工具</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', Arial, sans-serif; background: #f4f6f8; color: #1a1a1a; min-height: 100vh; }

        .site-header { background: #fff; border-bottom: 1px solid #e0e0e0; padding: 0 32px; display: flex; align-items: center; height: 64px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .logo-wrap { display: flex; align-items: center; gap: 14px; text-decoration: none; }
        .logo-wrap img { height: 38px; object-fit: contain; }
        .header-divider { width: 1px; height: 28px; background: #d0d0d0; margin: 0 16px; }
        .header-title { font-size: 15px; font-weight: 600; color: #1a1a1a; }
        .header-nav { margin-left: auto; display: flex; gap: 4px; }
        .nav-link { padding: 7px 14px; font-size: 13px; font-weight: 500; color: #555; text-decoration: none; border-radius: 5px; transition: background 0.15s; }
        .nav-link:hover { background: #f0f2f5; color: #1a1a1a; }
        .nav-link.active { background: #5a9e14; color: #fff; }

        .page-body { max-width: 960px; margin: 44px auto; padding: 0 20px 60px; }
        .page-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 4px; }
        .page-subtitle { font-size: 13px; color: #888; margin-bottom: 28px; }

        .card { background: #fff; border: 1px solid #e4e4e4; border-radius: 10px; padding: 24px 28px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.05); }
        .card-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #888; margin-bottom: 16px; }
        .card.accent-green { border-left: 4px solid #5a9e14; }

        input[type="text"] { padding: 8px 12px; font-size: 14px; font-family: inherit; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #fafafa; width: 220px; transition: border-color 0.2s, box-shadow 0.2s; }
        input[type="text"]:focus { outline: none; border-color: #5a9e14; background: #fff; box-shadow: 0 0 0 3px rgba(90,158,20,0.12); }
        select { padding: 8px 12px; font-size: 14px; font-family: inherit; border: 1.5px solid #d0d0d0; border-radius: 6px; background: #fafafa; }
        select:focus { outline: none; border-color: #5a9e14; }

        button { padding: 8px 16px; font-size: 13px; font-family: inherit; font-weight: 600; background: #5a9e14; color: #fff; border: none; cursor: pointer; border-radius: 6px; transition: background 0.2s; }
        button:hover { background: #4a8610; }
        button:disabled { background: #c0c7cc; cursor: not-allowed; }
        .btn-secondary { background: #6c757d; }
        .btn-secondary:hover { background: #5a6268; }
        .btn-danger { background: #dc3545; }
        .btn-danger:hover { background: #c82333; }
        .btn-warning { background: #e6a817; color: #1a1a1a; }
        .btn-warning:hover { background: #c89010; }
        .btn-info { background: #17a2b8; }
        .btn-info:hover { background: #138496; }

        table { border-collapse: collapse; width: 100%; margin-top: 14px; font-size: 13px; }
        th, td { border: 1px solid #e4e4e4; padding: 10px 12px; text-align: left; }
        th { background: #f4f6f8; color: #666; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

        .task-row { display: flex; align-items: center; justify-content: space-between; padding: 14px 12px; border-bottom: 1px solid #f0f0f0; transition: background 0.2s; }
        .task-row:last-child { border-bottom: none; }
        .task-row:hover { background: #fafafa; }
        .task-row.highlight { background: #fffbea; border-left: 3px solid #e6a817; }

        .checkbox-group label { margin-right: 14px; cursor: pointer; font-size: 13px; font-weight: 400; text-transform: none; letter-spacing: 0; color: #333; }
        .checkbox-group label input { margin-right: 5px; }

        .badge { font-size: 11px; padding: 3px 8px; border-radius: 10px; margin-left: 8px; display: inline-block; font-weight: 600; }
        .badge-loading { background: #e9ecef; color: #6c757d; }
        .badge-found { background: #dc3545; color: #fff; animation: pulse 2s infinite; }
        .badge-empty { background: #f4f6f8; color: #adb5bd; border: 1px solid #dee2e6; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.75; } 100% { opacity: 1; } }

        .view-btn { display: inline-block; padding: 4px 10px; background: #5a9e14; color: #fff; text-decoration: none; border-radius: 4px; font-size: 12px; font-weight: 600; }
        .view-btn:hover { background: #4a8610; }

        .status-text { font-size: 13px; color: #555; margin-top: 6px; }
        .hint { font-size: 12px; color: #aaa; margin-top: 6px; }

        .row-actions { display: flex; gap: 8px; }
        .task-meta { font-size: 12px; color: #888; margin-top: 4px; }
        .task-keyword { font-size: 14px; font-weight: 600; color: #1a1a1a; }
    </style>
</head>
<body>

<header class="site-header">
    <a href="index.html" class="logo-wrap">
        <img src="img/eff_logo_1223.jpg" alt="耀迅國際 EFF">
    </a>
    <div class="header-divider"></div>
    <span class="header-title">政府標案工具</span>
    <nav class="header-nav">
        <a href="index.html" class="nav-link">首頁</a>
        <a href="scheduled.html" class="nav-link active">設定</a>
        <a href="database.html" class="nav-link">資料庫</a>
    </nav>
</header>

<div class="page-body">
    <h1 class="page-title">設定</h1>
    <p class="page-subtitle">管理自動查詢任務清單與排程執行頻率。</p>

    <!-- 系統執行 & 排程設定 -->
    <div class="card accent-green">
        <div class="card-title">系統執行與排程設定</div>
        <div style="display: flex; gap: 32px; align-items: flex-start; flex-wrap: wrap;">
            <div>
                <button id="runAllBtn" class="btn-warning" onclick="runAllTasks()">立即執行全部排程</button>
                <div id="runStatus" class="status-text"></div>
            </div>
            <div style="border-left: 1px solid #e0e0e0; padding-left: 32px;">
                <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap;">
                    <label style="font-size:13px; font-weight:600; text-transform:none; letter-spacing:0; color:#333; margin:0;">自動執行頻率：</label>
                    <select id="cronSelect">
                        <option value="0 16 * * *">每天 00:00 (半夜)</option>
                        <option value="0 0 * * *">每天 08:00 (早上)</option>
                        <option value="0 4 * * *">每天 12:00 (中午)</option>
                        <option value="0 */12 * * *">每 12 小時一次</option>
                        <option value="0 */6 * * *">每 6 小時一次</option>
                        <option value="0 */2 * * *">每 2 小時一次</option>
                    </select>
                    <button class="btn-info" onclick="updateSchedule()">更新排程</button>
                </div>
                <div id="cronStatus" class="status-text"></div>
                <p class="hint">不建議設定過於頻繁，以免被政府網站阻擋 IP。</p>
            </div>
        </div>
    </div>

    <!-- 新增任務 -->
    <div class="card">
        <div class="card-title">新增自動任務</div>
        <div style="display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin-bottom: 14px;">
            <div>
                <label style="font-size:12px; font-weight:600; color:#666; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:5px; display:block;">關鍵字</label>
                <input type="text" id="newKeyword" placeholder="例如：伺服器">
            </div>
        </div>
        <div class="checkbox-group" style="margin-bottom: 16px;">
            <span style="font-size:12px; font-weight:700; color:#666; text-transform:uppercase; letter-spacing:0.5px; margin-right:12px;">招標類型</span>
            <label><input type="checkbox" value="招標公告" class="type-cb" checked> 招標公告</label>
            <label><input type="checkbox" value="公開徵求" class="type-cb"> 公開徵求</label>
            <label><input type="checkbox" value="公開閱覽" class="type-cb"> 公開閱覽</label>
            <label><input type="checkbox" value="政府採購預告" class="type-cb"> 政府採購預告</label>
        </div>
        <button onclick="addTask()">加入清單</button>
        <span id="saveStatus" style="color: #5a9e14; margin-left: 12px; font-size: 13px;"></span>
    </div>

    <!-- 任務清單 -->
    <div class="card">
        <div class="card-title" style="display:flex; align-items:center; justify-content:space-between;">
            <span>自動任務清單</span>
            <button class="btn-secondary" onclick="loadTasks()" style="font-size:12px; padding:5px 12px;">重新整理</button>
        </div>
        <div id="taskList">讀取中...</div>
    </div>

    <!-- 結果 -->
    <div class="card" id="resultBox" style="display: none;">
        <div class="card-title">
            <span id="resultTitle"></span> — 最近 30 天結果
        </div>
        <button class="btn-secondary" onclick="document.getElementById('resultBox').style.display='none'" style="margin-bottom: 14px;">隱藏結果</button>
        <div id="tableContainer" style="overflow-x: auto;"></div>
    </div>
</div>

<script>
    const owner = localStorage.getItem('gh_owner');
    const repo = localStorage.getItem('gh_repo');
    const token = localStorage.getItem('gh_token');
    let currentTasks = [];
    let fileSha = "";

    if (!token) alert("請先在首頁設定 GitHub Token！");

    function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
    function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

    async function loadCurrentSchedule() {
        const statusDiv = document.getElementById('cronStatus');
        statusDiv.innerHTML = "<span style='color:#888'>讀取目前排程設定中...</span>";
        try {
            const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/.github/workflows/auto_scraper.yml?t=${new Date().getTime()}`;
            const getRes = await fetch(fileUrl, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!getRes.ok) throw new Error("找不到 auto_scraper.yml");
            const data = await getRes.json();
            const yamlContent = b64_to_utf8(data.content.replace(/[\r\n\s]/g, ''));
            const cronMatch = yamlContent.match(/cron:\s*['"']?([^'"#\r\n]+)['"']?/);
            if (cronMatch && cronMatch[1]) {
                const currentCron = cronMatch[1].trim();
                const selectEl = document.getElementById('cronSelect');
                let found = false;
                for (let i = 0; i < selectEl.options.length; i++) {
                    if (selectEl.options[i].value === currentCron) { selectEl.selectedIndex = i; found = true; break; }
                }
                if (!found) { const o = new Option(`自訂 (${currentCron})`, currentCron, true, true); selectEl.add(o); }
                statusDiv.innerHTML = `<span style='color:#5a9e14'>目前雲端排程：<b>${currentCron}</b></span>`;
            } else {
                statusDiv.innerHTML = "<span style='color:#e6a817'>無法解析 auto_scraper.yml 中的排程設定</span>";
            }
        } catch (e) {
            statusDiv.innerHTML = `<span style='color:#dc3545'>讀取排程失敗：${e.message}</span>`;
        }
    }

    async function runAllTasks() {
        const btn = document.getElementById('runAllBtn');
        btn.disabled = true;
        document.getElementById('runStatus').innerText = "發送指令中...";
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/auto_scraper.yml/dispatches`, {
                method: 'POST',
                headers: { 'Accept': 'application/vnd.github.v3+json', 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ ref: 'main' })
            });
            if (res.ok) {
                document.getElementById('runStatus').innerHTML = "<span style='color:#5a9e14'>指令已送出！約 1~2 分鐘後查看結果。</span>";
            } else {
                document.getElementById('runStatus').innerHTML = "<span style='color:#dc3545'>觸發失敗，請檢查 Token 權限。</span>";
            }
        } catch (e) {
            document.getElementById('runStatus').innerHTML = "<span style='color:#dc3545'>連線錯誤。</span>";
        }
        setTimeout(() => { btn.disabled = false; }, 5000);
    }

    async function updateSchedule() {
        const newCron = document.getElementById('cronSelect').value;
        const statusDiv = document.getElementById('cronStatus');
        statusDiv.innerHTML = "<span style='color:#17a2b8'>正在修改 GitHub 設定檔...</span>";
        try {
            const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/.github/workflows/auto_scraper.yml`;
            const getRes = await fetch(fileUrl, { headers: { 'Authorization': `Bearer ${token}` } });
            if (!getRes.ok) throw new Error("找不到檔案");
            const data = await getRes.json();
            const ymlSha = data.sha;
            let yamlContent = b64_to_utf8(data.content.replace(/[\r\n\s]/g, ''));
            yamlContent = yamlContent.replace(/(-\s*cron:\s*)['"']?.*['"']?/, `$1'${newCron}'`);
            const putRes = await fetch(fileUrl, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: `Update schedule to ${newCron}`, content: utf8_to_b64(yamlContent), sha: ymlSha, branch: 'main' })
            });
            if (putRes.ok) {
                statusDiv.innerHTML = `<span style='color:#5a9e14'>已更新為：<b>${newCron}</b></span>`;
                setTimeout(loadCurrentSchedule, 1500);
            } else throw new Error("儲存失敗");
        } catch (e) { statusDiv.innerHTML = `<span style='color:#dc3545'>更新失敗：${e.message}</span>`; }
    }

    async function loadTasks() {
        document.getElementById('taskList').innerHTML = "讀取任務中...";
        try {
            const url = `https://api.github.com/repos/${owner}/${repo}/contents/data/tasks.json?t=${new Date().getTime()}`;
            const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
            if (res.status === 404) { currentTasks = []; renderTasks(); return; }
            const data = await res.json();
            fileSha = data.sha;
            currentTasks = JSON.parse(b64_to_utf8(data.content.replace(/[\r\n\s]/g, '')));
            renderTasks();
        } catch (e) {
            document.getElementById('taskList').innerHTML = "讀取失敗。";
        }
    }

    function renderTasks() {
        let html = '';
        if (currentTasks.length === 0) {
            html = "<p style='color:#aaa; padding: 12px 0; font-size:14px;'>目前無自動任務。</p>";
        } else {
            currentTasks.forEach(task => {
                html += `
                <div class="task-row" id="task-row-${task.id}">
                    <div>
                        <span class="task-keyword">${task.keyword}</span>
                        <span id="badge-${task.id}" class="badge badge-loading">掃描中...</span>
                        <div class="task-meta">類型：${task.types.join(', ')}</div>
                    </div>
                    <div class="row-actions">
                        <button onclick="viewResults('${task.id}', '${task.keyword}')" style="background:#5a9e14; font-size:12px; padding:6px 12px;">讀取結果</button>
                        <button class="btn-danger" onclick="deleteTask('${task.id}')" style="font-size:12px; padding:6px 12px;">刪除</button>
                    </div>
                </div>`;
            });
        }
        document.getElementById('taskList').innerHTML = html;
        currentTasks.forEach(task => checkTaskHasData(task.id));
    }

    async function checkTaskHasData(id) {
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/task_${id}.csv?t=${new Date().getTime()}`, {
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' }
            });
            const badge = document.getElementById(`badge-${id}`);
            const row = document.getElementById(`task-row-${id}`);
            if (!res.ok) { if (badge) { badge.className = 'badge badge-empty'; badge.innerText = '尚無紀錄'; } return; }
            const rows = (await res.text()).split('\n').filter(r => r.trim());
            if (rows.length > 1) {
                if (badge) { badge.className = 'badge badge-found'; badge.innerText = `發現 ${rows.length - 1} 筆標案`; row.classList.add('highlight'); }
            } else {
                if (badge) { badge.className = 'badge badge-empty'; badge.innerText = '無新標案'; }
            }
        } catch (e) {}
    }

    async function addTask() {
        const keyword = document.getElementById('newKeyword').value.trim();
        if (!keyword) return alert("請輸入關鍵字");
        const types = Array.from(document.querySelectorAll('.type-cb:checked')).map(cb => cb.value);
        currentTasks.push({ id: Date.now().toString(), keyword, types });
        await saveToGitHub();
        document.getElementById('newKeyword').value = '';
    }

    async function deleteTask(id) {
        if (!confirm("確定要刪除嗎？")) return;
        currentTasks = currentTasks.filter(t => t.id !== id);
        await saveToGitHub();
    }

    async function saveToGitHub() {
        document.getElementById('saveStatus').innerText = "儲存中...";
        const contentB64 = utf8_to_b64(JSON.stringify(currentTasks, null, 2));
        const body = { message: "Update automated tasks", content: contentB64, branch: "main" };
        if (fileSha) body.sha = fileSha;
        const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/tasks.json`, {
            method: 'PUT', headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
        });
        if (res.ok) { document.getElementById('saveStatus').innerText = "已儲存！"; await loadTasks(); }
    }

    async function viewResults(id, keyword) {
        document.getElementById('resultBox').style.display = 'block';
        document.getElementById('resultTitle').innerText = keyword;
        document.getElementById('tableContainer').innerHTML = "載入中...";
        try {
            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/task_${id}.csv?t=${new Date().getTime()}`, {
                headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' }
            });
            const rows = (await res.text()).split('\n').filter(r => r.trim());
            let html = '<table>';
            rows.forEach((row, index) => {
                let result = [], current = '', inQuotes = false;
                for (let i = 0; i < row.length; i++) {
                    let char = row[i];
                    if (char === '"' && row[i+1] === '"') { current += '"'; i++; }
                    else if (char === '"') inQuotes = !inQuotes;
                    else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                    else current += char;
                }
                result.push(current.trim());
                const cols = result.map(s => s.replace(/^"|"$/g, '').trim());
                html += '<tr>';
                cols.forEach((col, ci) => {
                    if (index === 0) html += `<th>${col}</th>`;
                    else if (ci === cols.length - 1 && col.startsWith('http')) html += `<td><a href="${col}" target="_blank" class="view-btn">檢視</a></td>`;
                    else html += `<td>${col}</td>`;
                });
                html += '</tr>';
            });
            html += '</table>';
            document.getElementById('tableContainer').innerHTML = html;
        } catch (e) {
            document.getElementById('tableContainer').innerHTML = "讀取失敗。";
        }
    }

    window.onload = () => { loadTasks(); loadCurrentSchedule(); };
</script>
</body>
</html>
