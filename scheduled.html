<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>定期自動查詢系統</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; line-height: 1.6; max-width: 1000px; margin: auto; background-color: #f4f7f6;}
        .box { background: white; border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 2px 2px 5px rgba(0,0,0,0.05); }
        input[type="text"] { padding: 8px; width: 200px; }
        select { padding: 8px; font-size: 15px; border-radius: 4px; }
        button { padding: 8px 15px; background: #007bff; color: white; border: none; cursor: pointer; border-radius: 4px; font-size: 15px;}
        button:hover { background: #0056b3; }
        button:disabled { background: #cccccc; cursor: not-allowed; }
        .danger-btn { background: #dc3545; }
        .danger-btn:hover { background: #c82333; }
        .warning-btn { background: #ffc107; color: black; font-weight: bold; }
        .warning-btn:hover { background: #e0a800; }
        table { border-collapse: collapse; width: 100%; margin-top: 15px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
        th { background-color: #e9ecef; }
        .task-row { display: flex; align-items: center; justify-content: space-between; padding: 15px 10px; border-bottom: 1px solid #eee; transition: background-color 0.3s; }
        .checkbox-group label { margin-right: 15px; cursor: pointer; }
        .nav { margin-bottom: 20px; }
        .nav a { margin-right: 15px; text-decoration: none; color: #007bff; font-weight: bold; }
        
        /* --- 標案高亮特效與 Badge 標籤樣式 --- */
        .task-row.highlight { background-color: #fff8d6; border-left: 5px solid #ffc107; }
        .badge { font-size: 12px; padding: 4px 8px; border-radius: 12px; margin-left: 10px; display: inline-block; }
        .badge-loading { background-color: #e9ecef; color: #6c757d; }
        .badge-found { background-color: #dc3545; color: white; font-weight: bold; animation: pulse 2s infinite; }
        .badge-empty { background-color: #f8f9fa; color: #adb5bd; border: 1px solid #dee2e6; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <div class="nav">
        <a href="index.html">← 回單次查詢首頁</a>
        <span>|</span>
        <span style="margin-left: 15px; color: gray;">🕒 定期自動查詢系統 (鎖定過去 30 天)</span>
    </div>

    <h1 style="text-align: center; color: #333;">⚙️ 任務排程管理中心</h1>

    <div class="box" style="border-left: 5px solid #28a745;">
        <h3>🎛️ 系統執行與排程設定</h3>
        <div style="display: flex; gap: 30px; align-items: center; flex-wrap: wrap;">
            <div>
                <button id="runAllBtn" class="warning-btn" onclick="runAllTasks()">▶️ 立即執行全部排程</button>
                <div id="runStatus" style="color: green; font-size: 14px; margin-top: 5px;"></div>
            </div>
            <div style="border-left: 1px solid #ddd; padding-left: 30px;">
                <label style="font-weight: bold;">自動執行頻率：</label>
                <select id="cronSelect">
                    <option value="0 16 * * *">每天 00:00 (半夜)</option>
                    <option value="0 0 * * *">每天 08:00 (早上)</option>
                    <option value="0 4 * * *">每天 12:00 (中午)</option>
                    <option value="0 */12 * * *">每 12 小時一次</option>
                    <option value="0 */6 * * *">每 6 小時一次</option>
                    <option value="0 */2 * * *">每 2 小時一次</option>
                </select>
                <button onclick="updateSchedule()" style="background: #17a2b8; margin-left: 10px;">💾 更新排程時間</button>
                <div id="cronStatus" style="font-size: 14px; margin-top: 5px;"></div>
                <div style="font-size: 12px; color: gray; margin-top: 5px;">* 不建議設定過於頻繁，以免被政府網站阻擋 IP。</div>
            </div>
        </div>
    </div>

    <div class="box">
        <h3>➕ 新增自動任務</h3>
        <label>關鍵字: </label>
        <input type="text" id="newKeyword" placeholder="例如: 伺服器">
        
        <div class="checkbox-group" style="margin: 15px 0;">
            <b>招標類型 (可複選): </b>
            <label><input type="checkbox" value="招標公告" class="type-cb" checked> 招標公告</label>
            <label><input type="checkbox" value="公開徵求" class="type-cb"> 公開徵求</label>
            <label><input type="checkbox" value="公開閱覽" class="type-cb"> 公開閱覽</label>
            <label><input type="checkbox" value="政府採購預告" class="type-cb"> 政府採購預告</label>
        </div>
        
        <button onclick="addTask()">➕ 加入清單</button>
        <span id="saveStatus" style="color: green; margin-left: 10px;"></span>
    </div>

    <div class="box">
        <h3>📋 目前的自動任務清單</h3>
        <button onclick="loadTasks()" style="background: #6c757d; margin-bottom: 15px;">🔄 重新整理清單</button>
        <div id="taskList">讀取中...</div>
    </div>

    <div class="box" id="resultBox" style="display: none;">
        <h3>📊 <span id="resultTitle"></span> 最近30天結果</h3>
        <button onclick="document.getElementById('resultBox').style.display='none'" style="margin-bottom: 15px; background: #6c757d;">隱藏結果</button>
        <div id="tableContainer" style="overflow-x: auto;"></div>
    </div>

    <script>
        const owner = localStorage.getItem('gh_owner');
        const repo = localStorage.getItem('gh_repo');
        const token = localStorage.getItem('gh_token');
        let currentTasks = [];
        let fileSha = ""; 

        if (!token) alert("請先在首頁設定 GitHub Token！");

        function utf8_to_b64(str) { return window.btoa(unescape(encodeURIComponent(str))); }
        function b64_to_utf8(str) { return decodeURIComponent(escape(window.atob(str))); }

        async function loadCurrentSchedule() {
            const statusDiv = document.getElementById('cronStatus');
            statusDiv.innerHTML = "<span style='color:gray'>🔍 讀取目前排程設定中...</span>";
            try {
                const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/.github/workflows/auto_scraper.yml?t=${new Date().getTime()}`;
                const getRes = await fetch(fileUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!getRes.ok) throw new Error("找不到 auto_scraper.yml");
                const data = await getRes.json();
                const yamlContent = b64_to_utf8(data.content);
                const match = yamlContent.match(/-\s*cron:\s*['"]?(.*?)['"]?(?=\s*(?:#|$))/);
                
                if (match && match[1]) {
                    const currentCron = match[1];
                    const selectEl = document.getElementById('cronSelect');
                    let optionExists = false;
                    for(let i=0; i<selectEl.options.length; i++){
                        if(selectEl.options[i].value === currentCron) {
                            selectEl.selectedIndex = i;
                            optionExists = true;
                            break;
                        }
                    }
                    if(!optionExists) {
                        const newOption = new Option(`自訂 (${currentCron})`, currentCron, true, true);
                        selectEl.add(newOption);
                    }
                    statusDiv.innerHTML = `<span style='color:green'>✅ 目前雲端排程頻率：<b>${currentCron}</b></span>`;
                } else {
                    statusDiv.innerHTML = "<span style='color:orange'>⚠️ 無法解析 auto_scraper.yml 中的排程設定</span>";
                }
            } catch(e) {
                statusDiv.innerHTML = `<span style='color:red'>❌ 讀取排程失敗：${e.message}</span>`;
            }
        }

        async function runAllTasks() {
            const btn = document.getElementById('runAllBtn');
            btn.disabled = true;
            document.getElementById('runStatus').innerText = "🔄 發送執行指令中...";
            try {
                const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/actions/workflows/auto_scraper.yml/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ref: 'main' })
                });
                if (res.ok) {
                    document.getElementById('runStatus').innerHTML = "✅ 指令已送出！<br>所有排程正在背景執行，請於 1~2 分鐘後查看結果。";
                } else {
                    document.getElementById('runStatus').innerHTML = "<span style='color:red'>❌ 觸發失敗，請確認 Token 包含 workflow 權限。</span>";
                }
            } catch(e) {
                document.getElementById('runStatus').innerHTML = "<span style='color:red'>❌ 連線錯誤。</span>";
            }
            setTimeout(() => { btn.disabled = false; }, 5000);
        }

        async function updateSchedule() {
            const newCron = document.getElementById('cronSelect').value;
            const statusDiv = document.getElementById('cronStatus');
            statusDiv.innerHTML = "<span style='color:blue'>🔄 正在修改 GitHub 設定檔...</span>";
            try {
                const fileUrl = `https://api.github.com/repos/${owner}/${repo}/contents/.github/workflows/auto_scraper.yml`;
                const getRes = await fetch(fileUrl, { headers: { 'Authorization': `Bearer ${token}` } });
                if (!getRes.ok) throw new Error("找不到 auto_scraper.yml 檔案");
                const data = await getRes.json();
                const ymlSha = data.sha;
                let yamlContent = b64_to_utf8(data.content);
                yamlContent = yamlContent.replace(/-\s*cron:\s*.*/, `- cron: '${newCron}'`);

                const putRes = await fetch(fileUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `Update schedule frequency to ${newCron}`,
                        content: utf8_to_b64(yamlContent),
                        sha: ymlSha,
                        branch: 'main'
                    })
                });

                if (putRes.ok) {
                    statusDiv.innerHTML = `<span style='color:green'>✅ 成功！排程時間已更新為：<b>${newCron}</b></span>`;
                } else { throw new Error("權限不足，無法修改檔案。"); }
            } catch(e) { statusDiv.innerHTML = `<span style='color:red'>❌ 更新失敗：${e.message}</span>`; }
        }

        async function loadTasks() {
            document.getElementById('taskList').innerHTML = "讀取任務中...";
            try {
                const url = `https://api.github.com/repos/${owner}/${repo}/contents/data/tasks.json?t=${new Date().getTime()}`;
                const res = await fetch(url, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.status === 404) {
                    currentTasks = [];
                    renderTasks();
                    return;
                }
                const data = await res.json();
                fileSha = data.sha;
                const jsonStr = b64_to_utf8(data.content);
                currentTasks = JSON.parse(jsonStr);
                renderTasks();
            } catch (e) {
                document.getElementById('taskList').innerHTML = "讀取失敗，可能是尚未建立任務檔。";
            }
        }

        // --- 核心修改：渲染任務後，派發檢查函數去查每個 CSV 的資料量 ---
        function renderTasks() {
            let html = '';
            if (currentTasks.length === 0) {
                html = "<p style='color:gray'>目前無自動任務。</p>";
            } else {
                currentTasks.forEach(task => {
                    // 加入 id 以便稍後透過 JS 修改背景與 badge
                    html += `
                    <div class="task-row" id="task-row-${task.id}">
                        <div>
                            <strong>🔑 關鍵字:</strong> ${task.keyword} 
                            <span id="badge-${task.id}" class="badge badge-loading">掃描中...</span>
                            <br>
                            <span style="font-size: 13px; color: gray;">🏷️ 類型: ${task.types.join(', ')}</span>
                        </div>
                        <div>
                            <button onclick="viewResults('${task.id}', '${task.keyword}')" style="background: #28a745;">👁️ 讀取最新結果</button>
                            <button class="danger-btn" onclick="deleteTask('${task.id}')">🗑️ 刪除</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('taskList').innerHTML = html;

            // 啟動背景檢查
            currentTasks.forEach(task => {
                checkTaskHasData(task.id);
            });
        }

        // --- 新功能 3：背景檢查 CSV 是否有資料，並加上 Highlight ---
        async function checkTaskHasData(id) {
            try {
                const noCacheUrl = `https://api.github.com/repos/${owner}/${repo}/contents/data/task_${id}.csv?t=${new Date().getTime()}`;
                const res = await fetch(noCacheUrl, { 
                    headers: { 
                        'Authorization': `Bearer ${token}`,
                        'Accept': 'application/vnd.github.v3.raw'
                    } 
                });
                
                const badge = document.getElementById(`badge-${id}`);
                const rowItem = document.getElementById(`task-row-${id}`);

                if (!res.ok) {
                    if(badge) { badge.className = 'badge badge-empty'; badge.innerText = '尚無紀錄'; }
                    return;
                }
                
                const csvText = await res.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                
                // 扣掉第一行標題列，如果還有剩下的，代表有標案！
                if(rows.length > 1) {
                    const count = rows.length - 1;
                    if(badge) {
                        badge.className = 'badge badge-found';
                        badge.innerText = `🔥 發現 ${count} 筆標案`;
                        rowItem.classList.add('highlight'); // 加上黃色高亮背景
                    }
                } else {
                    if(badge) {
                        badge.className = 'badge badge-empty';
                        badge.innerText = '無新標案';
                    }
                }
            } catch (e) {
                const badge = document.getElementById(`badge-${id}`);
                if(badge) { badge.className = 'badge badge-empty'; badge.innerText = '檢查失敗'; }
            }
        }

        async function addTask() {
            const keyword = document.getElementById('newKeyword').value.trim();
            if(!keyword) return alert("請輸入關鍵字");
            const checkboxes = document.querySelectorAll('.type-cb:checked');
            const types = Array.from(checkboxes).map(cb => cb.value);
            if(types.length === 0) return alert("請至少勾選一種招標類型");

            const newId = Date.now().toString();
            currentTasks.push({ id: newId, keyword: keyword, types: types });
            await saveToGitHub();
            document.getElementById('newKeyword').value = ''; 
        }

        async function deleteTask(id) {
            if(!confirm("確定要刪除此排程嗎？")) return;
            currentTasks = currentTasks.filter(task => task.id !== id);
            await saveToGitHub();
        }

        async function saveToGitHub() {
            document.getElementById('saveStatus').innerText = "儲存中...";
            const jsonStr = JSON.stringify(currentTasks, null, 2);
            const contentB64 = utf8_to_b64(jsonStr);
            const body = { message: "Update automated tasks", content: contentB64, branch: "main" };
            if (fileSha) body.sha = fileSha;

            const res = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/data/tasks.json`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });

            if (res.ok) {
                document.getElementById('saveStatus').innerText = "✅ 儲存成功！";
                setTimeout(() => document.getElementById('saveStatus').innerText = "", 3000);
                await loadTasks(); 
            } else { alert("儲存失敗，請檢查權限。"); }
        }

        async function viewResults(id, keyword) {
            document.getElementById('resultBox').style.display = 'block';
            document.getElementById('resultTitle').innerText = keyword;
            document.getElementById('tableContainer').innerHTML = "讀取資料中...";

            try {
                const noCacheUrl = `https://api.github.com/repos/${owner}/${repo}/contents/data/task_${id}.csv?t=${new Date().getTime()}`;
                const res = await fetch(noCacheUrl, { 
                    headers: { 'Authorization': `Bearer ${token}`, 'Accept': 'application/vnd.github.v3.raw' } 
                });
                
                if (!res.ok) throw new Error("尚未產出資料，或過去 30 天無新結果。");
                
                const csvText = await res.text();
                const rows = csvText.split('\n').filter(row => row.trim() !== '');
                if(rows.length <= 1) {
                    document.getElementById('tableContainer').innerHTML = "<p style='color:gray'>過去 30 天查無資料。</p>";
                    return;
                }

                let html = '<table>';
                rows.forEach((row, index) => {
                    let result = []; let current = ''; let inQuotes = false;
                    for (let i = 0; i < row.length; i++) {
                        let char = row[i];
                        if (char === '"' && row[i+1] === '"') { current += '"'; i++; }
                        else if (char === '"') inQuotes = !inQuotes;
                        else if (char === ',' && !inQuotes) { result.push(current.trim()); current = ''; }
                        else current += char;
                    }
                    result.push(current.trim());
                    const cols = result.map(s => s.replace(/^"|"$/g, '').trim());
                    html += '<tr>';
                    cols.forEach(col => html += index === 0 ? `<th>${col}</th>` : `<td>${col}</td>`);
                    html += '</tr>';
                });
                html += '</table>';
                document.getElementById('tableContainer').innerHTML = html;
            } catch (e) {
                document.getElementById('tableContainer').innerHTML = `<p style="color:red">${e.message}</p>`;
            }
        }

        window.onload = () => {
            loadTasks();
            loadCurrentSchedule();
        };
    </script>
</body>
</html>
