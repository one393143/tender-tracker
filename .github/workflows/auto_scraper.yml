name: Daily Auto Scrape

on:
  workflow_dispatch: # 允許從網頁按鈕「立即全部重新查詢」
  schedule:
    - cron: '0 */12 * * *'

jobs:
  auto-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests beautifulsoup4

      - name: 初始化資料庫（首次執行時將歷史 CSV 匯入，之後為 no-op）
        run: python migrate_to_database.py

      - name: 執行自動排程爬蟲（結果自動合併進 database.csv）
        env:
          EMAIL_USER: ${{ secrets.EMAIL_USER }}
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          EMAIL_RECEIVER: ${{ secrets.EMAIL_RECEIVER }}
        run: python auto_scraper.py

      - name: 儲存所有更新（task_*.csv + database.csv）
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto Update: 每日排程任務 + 資料庫累積更新" || echo "無變動，跳過 commit"
          git push
