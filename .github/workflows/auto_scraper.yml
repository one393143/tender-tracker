name: Daily Auto Scrape

on:
  workflow_dispatch: # 允許從網頁按鈕「立即全部重新查詢」
  schedule:
    - cron: '0 */2 * * *' # 預設每天台灣時間半夜 00:00 (UTC 16:00) 執行

jobs:
  auto-run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - run: pip install requests beautifulsoup4
      - name: 執行自動排程爬蟲
        run: python auto_scraper.py
      - name: 儲存多個任務結果
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git commit -m "Auto Update: 每日排程任務更新" || echo "無變動"
          git push
